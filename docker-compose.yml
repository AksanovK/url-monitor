services:
  app:
    image: ${DOCKER_IMAGE:-url-monitor:latest}
    build: .
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgres://monitor:monitor@db:5432/monitor?sslmode=disable
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: monitor
      POSTGRES_PASSWORD: monitor
      POSTGRES_DB: monitor
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U monitor"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata: